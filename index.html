<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrackSpent - Daily Money Clarity</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        .auth-section {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            max-width: 400px;
            margin: 40px auto;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; }
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-primary { background: #667eea; color: white; }
        .btn-secondary { background: #f0f0f0; color: #333; }
    </style>
</head>
<body>

    <div class="auth-section" id="authSection">
        <h2 style="text-align:center; color:#667eea; margin-bottom:10px;">TrackSpent</h2>
        <p style="text-align:center; color:#999; margin-bottom:20px;">Daily spending clarity in 30 seconds</p>
        
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="your@email.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        
        <button class="btn btn-primary" onclick="handleSignUp()">Sign Up</button>
        <button class="btn btn-secondary" onclick="handleLogIn()">Log In</button>
    </div>

    <!-- Firebase SDKs - Loaded in correct order -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

    <script>
        console.log("🚀 TrackSpent script starting...");

        const firebaseConfig = {
            apiKey: "AIzaSyB8MGJRfWSj7p50NPBEbuRyISJN99n3gs",
            authDomain: "trackspent-d2d17.firebaseapp.com",
            projectId: "trackspent-d2d17",
            storageBucket: "trackspent-d2d17.firebasestorage.app",
            messagingSenderId: "7421351313",
            appId: "1:7421351313:web:c44737431f175a030f1a3f"
        };

        // Wait for Firebase to load
        window.onload = function() {
            try {
                firebase.initializeApp(firebaseConfig);
                console.log("✅ Firebase initialized successfully");
                
                const auth = firebase.auth();

                window.handleSignUp = function() {
                    const email = document.getElementById('email').value.trim();
                    const password = document.getElementById('password').value;

                    console.log("Sign Up clicked - Email:", email);

                    if (!email || !password) {
                        alert("Please enter email and password");
                        return;
                    }

                    auth.createUserWithEmailAndPassword(email, password)
                        .then((userCredential) => {
                            console.log("✅ Signup Success!", userCredential.user.email);
                            alert("🎉 Account created successfully!");
                            // You can redirect or show main app here
                        })
                        .catch((error) => {
                            console.error("Signup Error:", error.code, error.message);
                            alert("Error: " + error.message);
                        });
                };

                window.handleLogIn = function() {
                    alert("Login function ready (same logic as signup)");
                    // You can implement login similarly
                };

                console.log("✅ All functions ready");
            } catch (err) {
                console.error("❌ Firebase setup failed:", err);
                alert("Firebase connection error. Please check console.");
            }
        };
    </script>
</body>
</html>
