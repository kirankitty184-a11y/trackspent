<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrackSpent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; }
        .sidebar-active { background-color: #4f46e5; color: white; }
        .card-hover:hover { transform: translateY(-4px); }
    </style>
</head>
<body class="bg-gray-50">

    <!-- Auth Screen -->
    <div id="authSection" class="max-w-md mx-auto mt-12 bg-white rounded-3xl shadow-2xl p-8">
        <h2 class="text-3xl font-bold text-center text-indigo-700">TrackSpent</h2>
        <p class="text-center text-gray-500 mt-2 mb-8">"See It. Limit It. Own It."</p>
        <input type="email" id="email" placeholder="Email" class="w-full px-4 py-3 border rounded-2xl mb-4">
        <div class="relative">
            <input type="password" id="password" placeholder="Password" class="w-full px-4 py-3 border rounded-2xl">
            <span id="togglePassword" class="absolute right-4 top-4 cursor-pointer text-2xl">👁️</span>
        </div>
        <button onclick="handleSignUp()" class="w-full mt-6 bg-indigo-600 text-white py-4 rounded-2xl font-semibold">Sign Up</button>
        <button onclick="handleLogIn()" class="w-full mt-3 bg-gray-100 text-gray-700 py-4 rounded-2xl font-semibold">Log In</button>
    </div>

    <!-- Dashboard -->
    <div id="appSection" class="hidden flex h-screen">
        <!-- Sidebar -->
        <div class="w-64 bg-white border-r shadow-sm p-4 overflow-auto">
            <div class="flex items-center gap-3 mb-8 px-3">
                <h1 class="text-2xl font-bold text-indigo-700">TrackSpent</h1>
            </div>
            <nav class="space-y-1">
                <a onclick="switchTab(0)" class="sidebar-active flex items-center gap-3 px-4 py-3 rounded-2xl text-sm font-medium cursor-pointer"><i class="fas fa-home"></i> Overview</a>
                <a onclick="switchTab(1)" class="flex items-center gap-3 px-4 py-3 rounded-2xl text-sm font-medium hover:bg-gray-100 cursor-pointer"><i class="fas fa-wallet"></i> Budgets</a>
                <a onclick="switchTab(2)" class="flex items-center gap-3 px-4 py-3 rounded-2xl text-sm font-medium hover:bg-gray-100 cursor-pointer"><i class="fas fa-chart-bar"></i> Reports</a>
                <a onclick="switchTab(3)" class="flex items-center gap-3 px-4 py-3 rounded-2xl text-sm font-medium hover:bg-gray-100 cursor-pointer"><i class="fas fa-lightbulb"></i> Insights</a>
            </nav>
        </div>

        <!-- Main Area -->
        <div class="flex-1 overflow-auto">
            <header class="bg-white border-b px-8 py-5 flex justify-between items-center">
                <h2 id="pageTitle" class="text-2xl font-semibold">Overview</h2>
                <div class="flex items-center gap-4">
                    <span id="userEmail" class="text-sm font-medium"></span>
                    <button onclick="handleLogOut()" class="px-6 py-2 bg-red-100 text-red-600 rounded-2xl text-sm font-medium">Logout</button>
                </div>
            </header>
            <div class="p-8" id="mainContent"></div>
        </div>
    </div>

    <!-- Add Expense Modal -->
    <div id="addModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">
        <div class="bg-white rounded-3xl p-8 w-full max-w-md">
            <h3 class="text-2xl font-semibold mb-6">Add New Expense</h3>
            <input id="modalDate" type="date" class="w-full p-3 border rounded-2xl mb-4">
            <input id="modalDesc" type="text" placeholder="Description / Item" class="w-full p-3 border rounded-2xl mb-4">
            <input id="modalAmount" type="number" placeholder="Amount (₹)" class="w-full p-3 border rounded-2xl mb-4">

            <div class="mb-6">
                <label class="block text-sm font-medium mb-2">Type</label>
                <div class="flex gap-3">
                    <button onclick="selectType(this)" data-type="Online" class="flex-1 py-3 border-2 border-emerald-500 rounded-2xl font-medium bg-emerald-50">📱 Online</button>
                    <button onclick="selectType(this)" data-type="Offline" class="flex-1 py-3 border-2 border-amber-500 rounded-2xl font-medium bg-amber-50">🛒 Offline</button>
                </div>
            </div>

            <select id="modalCategory" onchange="updateSubCategories()" class="w-full p-3 border rounded-2xl mb-4">
                <option value="Food & Dining">Food & Dining</option>
                <option value="Groceries">Groceries</option>
                <option value="E-commerce">E-commerce</option>
                <option value="Petrol / Fuel">Petrol / Fuel</option>
                <option value="Ride & Logistics">Ride & Logistics</option>
                <option value="Clothes & Fashion">Clothes & Fashion</option>
                <option value="Miscellaneous">Miscellaneous</option>
            </select>

            <select id="modalSubCategory" class="w-full p-3 border rounded-2xl mb-6"></select>

            <div class="flex gap-4">
                <button onclick="addExpense()" class="flex-1 bg-green-600 text-white py-4 rounded-2xl">Add Expense</button>
                <button onclick="hideModal()" class="flex-1 bg-gray-200 py-4 rounded-2xl">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyBM8GjRfW5j7p50NPBEbuRyISjN99Wn3gs",
          authDomain: "trackspent-d2d17.firebaseapp.com",
          projectId: "trackspent-d2d17",
          storageBucket: "trackspent-d2d17.firebasestorage.app",
          messagingSenderId: "74213513134",
          appId: "1:74213513134:web:c44737431f175a030f1a3f"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        let expenses = [];
        let selectedType = "Online";

        const subCategories = {
            "Food & Dining": ["Breakfast", "Lunch", "Dinner", "Snacks", "Coffee/Tea"],
            "Groceries": ["Vegetables", "Fruits", "Dairy", "Rice", "Oil"],
            "E-commerce": ["Electronics", "Clothing", "Home & Kitchen", "Beauty"],
            "Petrol / Fuel": ["Petrol", "Diesel", "CNG"],
            "Ride & Logistics": ["Uber", "Ola", "Rapido", "Auto"],
            "Clothes & Fashion": ["Men's Wear", "Women's Wear", "Kids Wear", "Shoes"],
            "Miscellaneous": ["Health", "Entertainment", "Bills", "Gifts"]
        };

        function updateSubCategories() {
            const category = document.getElementById('modalCategory').value;
            const subSelect = document.getElementById('modalSubCategory');
            subSelect.innerHTML = '<option value="">Select Sub Category</option>';
            if (subCategories[category]) {
                subCategories[category].forEach(sub => {
                    subSelect.innerHTML += `<option value="${sub}">${sub}</option>`;
                });
            }
        }

        function selectType(btn) {
            document.querySelectorAll('#addModal button[data-type]').forEach(b => b.classList.remove('ring-2', 'ring-indigo-500'));
            btn.classList.add('ring-2', 'ring-indigo-500');
            selectedType = btn.dataset.type;
        }

        document.getElementById('togglePassword').addEventListener('click', function() {
            const pwd = document.getElementById('password');
            pwd.type = pwd.type === "password" ? "text" : "password";
            this.textContent = pwd.type === "password" ? "🙈" : "👁️";
        });

        function handleSignUp() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            if (!email || password.length < 6) return alert("Please enter valid email and password");
            auth.createUserWithEmailAndPassword(email, password)
                .then(user => showApp(user.user))
                .catch(err => alert(err.message));
        }

        function handleLogIn() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            if (!email || !password) return alert("Please fill all fields");
            auth.signInWithEmailAndPassword(email, password)
                .then(user => showApp(user.user))
                .catch(err => alert(err.message));
        }

        function handleLogOut() {
            auth.signOut().then(() => {
                document.getElementById('appSection').classList.add('hidden');
                document.getElementById('authSection').classList.remove('hidden');
            });
        }

        function showApp(user) {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('appSection').classList.remove('hidden');
            document.getElementById('userEmail').textContent = user.email;
            loadExpenses();
        }

        function loadExpenses() {
            expenses = JSON.parse(localStorage.getItem('trackspent_expenses')) || [];
            if (expenses.length === 0) {
                expenses = [
                    {id:1, date:"2025-06-18", desc:"Swiggy Dinner", amount:450, category:"Food & Dining"},
                    {id:2, date:"2025-06-17", desc:"Petrol Fill", amount:1200, category:"Petrol / Fuel"},
                    {id:3, date:"2025-06-16", desc:"Amazon Shopping", amount:899, category:"E-commerce"}
                ];
                localStorage.setItem('trackspent_expenses', JSON.stringify(expenses));
            }
            switchTab(0);
        }

        function saveExpenses() {
            localStorage.setItem('trackspent_expenses', JSON.stringify(expenses));
            switchTab(0);
        }

        function switchTab(tab) {
            document.querySelectorAll('a[onclick^="switchTab"]').forEach(link => link.classList.remove('sidebar-active'));
            const links = document.querySelectorAll('a[onclick^="switchTab"]');
            if (links[tab]) links[tab].classList.add('sidebar-active');

            const content = document.getElementById('mainContent');
            if (tab === 0) {
                document.getElementById('pageTitle').textContent = "Overview";
                renderOverview();
            } else {
                document.getElementById('pageTitle').textContent = ["Budgets", "Reports", "Insights"][tab-1];
                content.innerHTML = `<div class="text-center py-20 text-gray-400">This feature is coming soon</div>`;
            }
        }

        function renderOverview() {
            const total = expenses.reduce((sum, e) => sum + Number(e.amount), 0);
            document.getElementById('monthlyTotal').textContent = `₹${total.toLocaleString('en-IN') || 0}`;

            // Sidebar
            const cats = ["Food & Dining","E-commerce","Groceries","Petrol / Fuel","Ride & Logistics"];
            let html = '';
            cats.forEach(cat => {
                const sum = expenses.filter(e => e.category === cat).reduce((a,b) => a + Number(b.amount), 0);
                html += `<div class="flex justify-between"><span>${cat}</span><span class="font-medium">₹${sum || 0}</span></div>`;
            });
            document.getElementById('sidebarCategories').innerHTML = html;

            // Main Content
            const content = document.getElementById('mainContent');
            content.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="bg-white p-6 rounded-3xl shadow">
                        <h3 class="text-sm text-gray-500">Total Spent</h3>
                        <p class="text-4xl font-bold text-indigo-600">₹${total}</p>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow">
                    <h3 class="font-semibold mb-4">Spending by Category</h3>
                    <canvas id="pieChart" height="180"></canvas>
                </div>
            `;

            new Chart(document.getElementById('pieChart'), {
                type: 'pie',
                data: {
                    labels: cats,
                    datasets: [{
                        data: cats.map(cat => expenses.filter(e => e.category === cat).reduce((a,b) => a + Number(b.amount), 0)),
                        backgroundColor: ['#6366f1', '#8b5cf6', '#ec4899', '#f59e0b', '#10b981']
                    }]
                }
            });
        }

        function showAddModal() {
            document.getElementById('addModal').classList.remove('hidden');
            document.getElementById('modalDate').valueAsDate = new Date();
            updateSubCategories();
        }

        function hideModal() {
            document.getElementById('addModal').classList.add('hidden');
        }

        function addExpense() {
            const desc = document.getElementById('modalDesc').value.trim();
            const amount = parseFloat(document.getElementById('modalAmount').value);
            const category = document.getElementById('modalCategory').value;
            const date = document.getElementById('modalDate').value;

            if (!desc || !amount) return alert("Please fill description and amount");

            expenses.unshift({
                id: Date.now(),
                date: date,
                desc: desc,
                amount: amount,
                category: category
            });

            saveExpenses();
            hideModal();
            alert("✅ Expense added successfully!");
        }

        auth.onAuthStateChanged(user => {
            if (user) showApp(user);
        });
    </script>
</body>
</html>
