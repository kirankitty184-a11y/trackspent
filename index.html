<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrackSpent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; }
        .sidebar-active { background-color: #4f46e5; color: white; }
    </style>
</head>
<body class="bg-gray-100">

    <!-- Auth -->
    <div id="authSection" class="max-w-md mx-auto mt-12 bg-white rounded-3xl shadow-2xl p-8">
        <h2 class="text-3xl font-bold text-center text-indigo-700">TrackSpent</h2>
        <p class="text-center text-gray-500 mt-2 mb-8">"See It. Limit It. Own It."</p>
        <input type="email" id="email" placeholder="Email" class="w-full px-4 py-3 border rounded-2xl mb-4">
        <div class="relative">
            <input type="password" id="password" placeholder="Password" class="w-full px-4 py-3 border rounded-2xl">
            <span id="togglePassword" class="absolute right-4 top-4 cursor-pointer text-2xl">👁️</span>
        </div>
        <button onclick="handleSignUp()" class="w-full mt-6 bg-indigo-600 text-white py-4 rounded-2xl font-semibold">Sign Up</button>
        <button onclick="handleLogIn()" class="w-full mt-3 bg-gray-100 text-gray-700 py-4 rounded-2xl font-semibold">Log In</button>
    </div>

    <!-- Main App -->
    <div id="appSection" class="hidden flex h-screen">
        <!-- Left Sidebar -->
        <div class="w-64 bg-white border-r shadow-sm p-4 overflow-auto">
            <div class="flex items-center gap-3 mb-8 px-3">
                <h1 class="text-2xl font-bold text-indigo-700">TrackSpent</h1>
            </div>
            <nav class="space-y-1">
                <a href="#" onclick="switchTab(0)" class="sidebar-active flex items-center gap-3 px-4 py-3 rounded-2xl text-sm font-medium"><i class="fas fa-home"></i> Overview</a>
                <a href="#" onclick="switchTab(1)" class="flex items-center gap-3 px-4 py-3 rounded-2xl text-sm font-medium hover:bg-gray-100"><i class="fas fa-wallet"></i> Budgets</a>
                <a href="#" onclick="switchTab(2)" class="flex items-center gap-3 px-4 py-3 rounded-2xl text-sm font-medium hover:bg-gray-100"><i class="fas fa-chart-bar"></i> Reports</a>
                <a href="#" onclick="switchTab(3)" class="flex items-center gap-3 px-4 py-3 rounded-2xl text-sm font-medium hover:bg-gray-100"><i class="fas fa-lightbulb"></i> Insights</a>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="flex-1 overflow-auto">
            <header class="bg-white border-b px-8 py-5 flex justify-between items-center">
                <h2 id="pageTitle" class="text-2xl font-semibold">Overview</h2>
                <div class="flex items-center gap-4">
                    <span id="userEmail" class="text-sm"></span>
                    <button onclick="handleLogOut()" class="px-6 py-2 bg-red-100 text-red-600 rounded-2xl text-sm font-medium">Logout</button>
                </div>
            </header>

            <div class="p-8">
                <div id="mainContent">
                    <!-- Overview Content will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Add Expense Modal (same as before with sub categories) -->
    <!-- ... (I kept it short for space - use previous modal code) -->

    <script>
        // Firebase config and auth functions remain same as previous version
        // ... (copy auth part from previous)

        // For now, showing premium layout with dummy data
        function showApp(user) {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('appSection').classList.remove('hidden');
            document.getElementById('userEmail').textContent = user.email;
            loadOverview();
        }

        function loadOverview() {
            document.getElementById('mainContent').innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="bg-white p-6 rounded-3xl shadow">
                        <h3 class="text-sm text-gray-500">Total Spent</h3>
                        <p class="text-4xl font-bold text-indigo-600 mt-2">₹2,549</p>
                    </div>
                    <div class="bg-white p-6 rounded-3xl shadow">
                        <h3 class="text-sm text-gray-500">Monthly Budget</h3>
                        <p class="text-4xl font-bold text-emerald-600 mt-2">₹15,000</p>
                        <div class="h-2 bg-gray-200 rounded-full mt-4">
                            <div class="h-2 bg-emerald-500 rounded-full w-1/3"></div>
                        </div>
                    </div>
                    <div class="bg-white p-6 rounded-3xl shadow">
                        <h3 class="text-sm text-gray-500">Remaining</h3>
                        <p class="text-4xl font-bold text-amber-600 mt-2">₹12,451</p>
                    </div>
                </div>
                <!-- Pie Chart -->
                <div class="mt-8 bg-white p-6 rounded-3xl shadow">
                    <h3 class="font-semibold mb-4">Spending by Category</h3>
                    <canvas id="pieChart" height="120"></canvas>
                </div>
            `;

            // Simple Pie Chart
            new Chart(document.getElementById('pieChart'), {
                type: 'pie',
                data: {
                    labels: ['Food', 'E-commerce', 'Petrol', 'Groceries'],
                    datasets: [{
                        data: [450, 899, 1200, 0],
                        backgroundColor: ['#6366f1', '#8b5cf6', '#f59e0b', '#10b981']
                    }]
                }
            });
        }

        // Rest of the functions (addExpense, etc.) can be added from previous versions
        auth.onAuthStateChanged(user => {
            if (user) showApp(user);
        });
    </script>
</body>
</html>
