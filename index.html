<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrackSpent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-600 to-blue-600 min-h-screen flex items-center justify-center p-4">

    <!-- Auth Screen -->
    <div id="authSection" class="bg-white rounded-3xl shadow-2xl p-8 w-full max-w-md">
        <h2 class="text-3xl font-bold text-center text-indigo-700 mb-2">TrackSpent</h2>
        <p class="text-center text-gray-500 mb-8">Know where your money goes</p>

        <input type="email" id="email" placeholder="Email" class="w-full px-4 py-3 border border-gray-300 rounded-2xl mb-4 focus:outline-none">
        <div class="relative mb-6">
            <input type="password" id="password" placeholder="Password" class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none">
            <span id="togglePassword" class="absolute right-4 top-4 text-gray-400 cursor-pointer text-xl">👁️</span>
        </div>

        <button onclick="handleSignUp()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-semibold mb-3">Sign Up</button>
        <button onclick="handleLogIn()" class="w-full bg-gray-100 text-gray-700 py-4 rounded-2xl font-semibold">Log In</button>
    </div>

    <!-- Dashboard -->
    <div id="appSection" class="hidden min-h-screen w-full">
        <div class="max-w-7xl mx-auto p-8">
            <div class="bg-white rounded-3xl shadow-xl p-10 text-center">
                <h1 class="text-4xl font-bold text-indigo-700 mb-4">Welcome to TrackSpent</h1>
                <p id="userEmail" class="text-lg text-gray-600 mb-8"></p>
                <button onclick="handleLogOut()" class="bg-red-500 text-white px-8 py-3 rounded-2xl">Logout</button>
                
                <div class="mt-12">
                    <button onclick="showAddModal()" class="bg-indigo-600 text-white px-8 py-4 rounded-2xl text-lg">+ Add Your First Expense</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Simple Modal -->
    <div id="addModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center">
        <div class="bg-white rounded-3xl p-8 w-full max-w-sm">
            <h3 class="text-xl font-bold mb-6">Add Expense</h3>
            <input id="modalDesc" placeholder="Description" class="w-full p-3 border rounded-xl mb-3">
            <input id="modalAmount" type="number" placeholder="Amount ₹" class="w-full p-3 border rounded-xl mb-6">
            <div class="flex gap-3">
                <button onclick="addExpense()" class="flex-1 bg-green-600 text-white py-4 rounded-2xl">Add</button>
                <button onclick="hideModal()" class="flex-1 bg-gray-200 py-4 rounded-2xl">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyBM8GjRfW5j7p50NPBEbuRyISjN99Wn3gs",
          authDomain: "trackspent-d2d17.firebaseapp.com",
          projectId: "trackspent-d2d17",
          storageBucket: "trackspent-d2d17.firebasestorage.app",
          messagingSenderId: "74213513134",
          appId: "1:74213513134:web:c44737431f175a030f1a3f"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // Password toggle
        document.getElementById('togglePassword').addEventListener('click', function() {
            const pwd = document.getElementById('password');
            pwd.type = pwd.type === "password" ? "text" : "password";
            this.textContent = pwd.type === "password" ? "🙈" : "👁️";
        });

        function handleSignUp() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            if (!email || password.length < 6) return alert("Please enter valid email and password (6+ chars)");

            auth.createUserWithEmailAndPassword(email, password)
                .then(() => {
                    alert("✅ Account created! Logging you in...");
                    location.reload();
                })
                .catch(err => alert("Signup Error: " + err.message));
        }

        function handleLogIn() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            if (!email || !password) return alert("Please fill email and password");

            auth.signInWithEmailAndPassword(email, password)
                .then(() => location.reload())
                .catch(err => alert("Login Error: " + err.message));
        }

        function handleLogOut() {
            auth.signOut().then(() => location.reload());
        }

        function showApp(user) {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('appSection').classList.remove('hidden');
            document.getElementById('userEmail').textContent = "Logged in as: " + user.email;
        }

        // Check login status
        auth.onAuthStateChanged(user => {
            if (user) showApp(user);
        });

        function showAddModal() { document.getElementById('addModal').classList.remove('hidden'); }
        function hideModal() { document.getElementById('addModal').classList.add('hidden'); }
        function addExpense() {
            alert("✅ Expense added! (Full dashboard coming soon)");
            hideModal();
        }
    </script>
</body>
</html>
