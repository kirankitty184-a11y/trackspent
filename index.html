<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrackSpent - Daily Money Clarity</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        .auth-section, .app-section {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }
        h2 { text-align: center; color: #667eea; margin-bottom: 10px; }
        p { text-align: center; color: #777; margin-bottom: 25px; }
        .form-group { 
            margin-bottom: 18px; 
            position: relative;
        }
        label { display: block; margin-bottom: 6px; font-weight: 500; }
        input {
            width: 100%;
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 38px;
            cursor: pointer;
            color: #666;
            font-size: 18px;
        }
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-primary { background: #667eea; color: white; }
        .btn-secondary { background: #f1f1f1; color: #333; }
        .btn-logout { background: #ff6b6b; color: white; padding: 10px 20px; width: auto; }
    </style>
</head>
<body>

    <!-- Auth Screen -->
    <div class="auth-section" id="authSection">
        <h2>TrackSpent</h2>
        <p>Daily spending clarity in 30 seconds</p>
        
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="your@email.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
            <span class="toggle-password" id="togglePassword">👁️</span>
        </div>
        
        <button class="btn btn-primary" onclick="handleSignUp()">Sign Up</button>
        <button class="btn btn-secondary" onclick="handleLogIn()">Log In</button>
    </div>

    <!-- Main Dashboard -->
    <div class="app-section" id="appSection" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2>TrackSpent</h2>
            <button class="btn-logout" onclick="handleLogOut()">Log Out</button>
        </div>
        <p style="text-align:center; color:#667eea; font-weight:500;" id="userEmail"></p>

        <div style="text-align:center; padding: 40px 20px; color: #666;">
            <h3>Welcome to Dashboard!</h3>
            <p>You are successfully logged in.</p>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyBM8GjRfW5j7p50NPBEbuRyISjN99Wn3gs",
          authDomain: "trackspent-d2d17.firebaseapp.com",
          projectId: "trackspent-d2d17",
          storageBucket: "trackspent-d2d17.firebasestorage.app",
          messagingSenderId: "74213513134",
          appId: "1:74213513134:web:c44737431f175a030f1a3f",
          measurementId: "G-HR90QQC9R7"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // Password Toggle
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordField = document.getElementById('password');
            if (passwordField.type === "password") {
                passwordField.type = "text";
                this.textContent = "🙈";
            } else {
                passwordField.type = "password";
                this.textContent = "👁️";
            }
        });

        function handleSignUp() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || password.length < 6) {
                alert("Please enter valid email and password (min 6 chars)");
                return;
            }

            auth.createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    alert("✅ Account created successfully!");
                    showApp(userCredential.user);
                })
                .catch(err => alert("Error: " + err.message));
        }

        function handleLogIn() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                alert("Please enter email and password");
                return;
            }

            auth.signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    alert("✅ Login successful!");
                    showApp(userCredential.user);
                })
                .catch(err => alert("Error: " + err.message));
        }

        function handleLogOut() {
            auth.signOut().then(() => {
                document.getElementById('authSection').style.display = 'block';
                document.getElementById('appSection').style.display = 'none';
            });
        }

        function showApp(user) {
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('appSection').style.display = 'block';
            document.getElementById('userEmail').textContent = "Logged in as: " + user.email;
        }

        auth.onAuthStateChanged(user => {
            if (user) showApp(user);
        });
    </script>
</body>
</html>
