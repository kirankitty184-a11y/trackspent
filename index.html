<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrackSpent - Daily Money Clarity</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        .auth-section {
            max-width: 420px;
            margin: 40px auto;
            background: white;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }
        h2 { text-align: center; color: #667eea; margin-bottom: 8px; }
        p { text-align: center; color: #777; margin-bottom: 25px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-weight: 500; }
        input {
            width: 100%;
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }
        .btn-primary { background: #667eea; color: white; }
        .btn-secondary { background: #f1f1f1; color: #333; }
    </style>
</head>
<body>

    <div class="auth-section" id="authSection">
        <h2>TrackSpent</h2>
        <p>Daily spending clarity in 30 seconds</p>
        
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="your@email.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        
        <button class="btn btn-primary" onclick="handleSignUp()">Sign Up</button>
        <button class="btn btn-secondary" onclick="handleLogIn()">Log In</button>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyBM8GjRfW5j7p50NPBEbuRyISjN99Wn3gs",
          authDomain: "trackspent-d2d17.firebaseapp.com",
          projectId: "trackspent-d2d17",
          storageBucket: "trackspent-d2d17.firebasestorage.app",
          messagingSenderId: "74213513134",
          appId: "1:74213513134:web:c44737431f175a030f1a3f",
          measurementId: "G-HR90QQC9R7"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        function handleSignUp() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password || password.length < 6) {
                alert("Please enter a valid email and password (minimum 6 characters)");
                return;
            }

            auth.createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    alert("✅ Account created successfully!\nNow you can Log In.");
                    console.log("User created:", userCredential.user.email);
                })
                .catch((error) => {
                    console.error(error);
                    alert("Signup Error: " + error.message);
                });
        }

        function handleLogIn() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                alert("Please enter email and password");
                return;
            }

            auth.signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    alert("✅ Login successful! Welcome to TrackSpent.");
                    console.log("Logged in:", userCredential.user.email);
                })
                .catch((error) => {
                    console.error(error);
                    alert("Login Error: " + error.message);
                });
        }
    </script>
</body>
</html>
