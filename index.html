<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrackSpent - Daily Money Clarity</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        .auth-section, .summary-card, .entry-card, .history-card, .csv-section {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; }
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-primary { background: #667eea; color: white; }
        .btn-secondary { background: #f0f0f0; color: #333; }
        .tab { flex: 1; padding: 12px; background: white; border: none; border-radius: 8px; }
        .tab.active { background: #667eea; color: white; }
        .tabs { display: flex; gap: 10px; margin: 20px 0; }
        .total-amount { font-size: 48px; font-weight: 700; color: #667eea; }
    </style>
</head>
<body>

    <div class="auth-section" id="authSection">
        <h2>TrackSpent</h2>
        <p style="text-align:center;color:#999;margin-bottom:20px;">Daily spending clarity in 30 seconds</p>
        
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="your@email.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        
        <button class="btn btn-primary" onclick="handleSignUp()">Sign Up</button>
        <button class="btn btn-secondary" onclick="handleLogIn()">Log In</button>
    </div>

    <div class="auth-section" id="appSection" style="display:none;">
        <h2>Welcome, <span id="userEmail"></span></h2>
        <button onclick="handleLogOut()" style="background:#ff6b6b;color:white;padding:10px 20px;border:none;border-radius:8px;">Log Out</button>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>

    <script>
        console.log("🚀 Script loaded successfully");

        const firebaseConfig = {
            apiKey: "AIzaSyB8MGJRfWSj7p50NPBEbuRyISJN99n3gs",
            authDomain: "trackspent-d2d17.firebaseapp.com",
            projectId: "trackspent-d2d17",
            storageBucket: "trackspent-d2d17.firebasestorage.app",
            messagingSenderId: "7421351313",
            appId: "1:7421351313:web:c44737431f175a030f1a3f"
        };

        try {
            firebase.initializeApp(firebaseConfig);
            console.log("✅ Firebase initialized");
        } catch (e) {
            console.error("❌ Firebase init failed:", e);
        }

        const auth = firebase.auth();
        const db = firebase.firestore();

        function handleSignUp() {
            console.log("🔄 Sign Up button clicked");
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            console.log("Email:", email, "Password length:", password.length);

            if (!email || !password) {
                alert("Please fill email and password");
                return;
            }

            auth.createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    console.log("✅ User created successfully!", userCredential.user);
                    alert("Account created! Welcome!");
                    showApp(userCredential.user);
                })
                .catch((error) => {
                    console.error("❌ Signup Error:", error.code, error.message);
                    alert("Signup Failed: " + error.message);
                });
        }

        function handleLogIn() {
            console.log("🔄 Login button clicked");
            // ... similar logic
            alert("Login function called (check console)");
        }

        function showApp(user) {
            console.log("✅ Showing main app for user:", user.email);
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('appSection').style.display = 'block';
            document.getElementById('userEmail').textContent = user.email;
        }

        function handleLogOut() {
            auth.signOut().then(() => {
                document.getElementById('authSection').style.display = 'block';
                document.getElementById('appSection').style.display = 'none';
            });
        }

        // Check current auth state
        auth.onAuthStateChanged((user) => {
            console.log("🔍 Auth state changed:", user ? "Logged in" : "Not logged in");
            if (user) {
                showApp(user);
            }
        });

        console.log("✅ All scripts initialized");
    </script>
</body>
</html>
