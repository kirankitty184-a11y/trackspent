<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrackSpent - Expense Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; }
        .card-hover:hover { transform: translateY(-4px); }
        .progress-bar { height: 6px; background: linear-gradient(to right, #4f46e5, #22c55e); border-radius: 9999px; }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-600 to-indigo-700 min-h-screen">

    <!-- Auth Screen -->
    <div id="authSection" class="max-w-md mx-auto mt-16 bg-white rounded-3xl shadow-2xl p-8">
        <h2 class="text-3xl font-bold text-center text-indigo-700 mb-1">TrackSpent</h2>
        <p class="text-center text-gray-500 mb-8">Daily spending clarity in 30 seconds</p>
        
        <div class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" id="email" class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-indigo-500" placeholder="your@email.com">
            </div>
            <div class="relative">
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password" class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-indigo-500" placeholder="••••••••">
                <span id="togglePassword" class="absolute right-4 top-9 text-gray-400 hover:text-gray-600 cursor-pointer text-xl">👁️</span>
            </div>
            <button onclick="handleSignUp()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-4 rounded-2xl transition">Sign Up</button>
            <button onclick="handleLogIn()" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-4 rounded-2xl transition">Log In</button>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="appSection" class="hidden">
        <!-- Top Header -->
        <header class="bg-white border-b px-8 py-5 flex items-center justify-between shadow-sm">
            <div class="flex items-center gap-3">
                <h1 class="text-2xl font-bold text-indigo-700">TrackSpent</h1>
            </div>
            <div class="flex items-center gap-6">
                <span id="userEmail" class="text-sm text-gray-600 font-medium"></span>
                <button onclick="handleLogOut()" class="px-6 py-2.5 bg-red-100 hover:bg-red-200 text-red-600 rounded-2xl text-sm font-medium">Logout</button>
            </div>
        </header>

        <div class="flex h-[calc(100vh-73px)]">
            <!-- Left Sidebar -->
            <div class="w-80 bg-white border-r p-6 overflow-auto">
                <div class="mb-8">
                    <p class="text-gray-500 text-sm">Total Spent This Month</p>
                    <p id="monthlyTotal" class="text-5xl font-bold text-indigo-700 mt-1">₹28,450</p>
                </div>

                <h3 class="font-semibold text-gray-700 mb-4">Category Breakdown</h3>
                <div id="sidebarCategories" class="space-y-5"></div>
            </div>

            <!-- Main Content -->
            <div class="flex-1 p-8 overflow-auto bg-gray-50">
                <div class="flex justify-between items-center mb-8">
                    <div>
                        <h2 class="text-3xl font-semibold text-gray-800">June 2025</h2>
                        <p class="text-gray-500">Track your daily expenses</p>
                    </div>
                    <button onclick="showAddModal()" class="bg-indigo-600 text-white px-6 py-3 rounded-2xl flex items-center gap-2 hover:bg-indigo-700 transition">
                        <i class="fas fa-plus"></i> Add New Expense
                    </button>
                </div>

                <!-- Quick Stats -->
                <div class="grid grid-cols-3 gap-6 mb-8">
                    <div class="bg-white rounded-3xl p-6 card-hover shadow">
                        <p class="text-sm text-gray-500">Online</p>
                        <p class="text-3xl font-bold text-emerald-600 mt-2">₹12,840</p>
                    </div>
                    <div class="bg-white rounded-3xl p-6 card-hover shadow">
                        <p class="text-sm text-gray-500">Offline</p>
                        <p class="text-3xl font-bold text-amber-600 mt-2">₹15,610</p>
                    </div>
                    <div class="bg-white rounded-3xl p-6 card-hover shadow">
                        <p class="text-sm text-gray-500">This Month</p>
                        <p class="text-3xl font-bold text-indigo-600 mt-2">₹28,450</p>
                    </div>
                </div>

                <!-- Categories -->
                <div id="mainCategories" class="space-y-6"></div>
            </div>

            <!-- Right Sidebar - Recent -->
            <div class="w-80 bg-white border-l p-6 overflow-auto">
                <h3 class="font-semibold text-gray-700 mb-4">Recent Transactions</h3>
                <div id="recentList" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyBM8GjRfW5j7p50NPBEbuRyISjN99Wn3gs",
          authDomain: "trackspent-d2d17.firebaseapp.com",
          projectId: "trackspent-d2d17",
          storageBucket: "trackspent-d2d17.firebasestorage.app",
          messagingSenderId: "74213513134",
          appId: "1:74213513134:web:c44737431f175a030f1a3f"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        let expenses = [];

        // Password Toggle
        document.getElementById('togglePassword').addEventListener('click', function() {
            const pwd = document.getElementById('password');
            if (pwd.type === "password") {
                pwd.type = "text";
                this.textContent = "🙈";
            } else {
                pwd.type = "password";
                this.textContent = "👁️";
            }
        });

        function handleSignUp() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            if (!email || password.length < 6) return alert("Invalid email or password");
            auth.createUserWithEmailAndPassword(email, password)
                .then(user => showApp(user.user))
                .catch(err => alert(err.message));
        }

        function handleLogIn() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            if (!email || !password) return alert("Please fill credentials");
            auth.signInWithEmailAndPassword(email, password)
                .then(user => showApp(user.user))
                .catch(err => alert(err.message));
        }

        function handleLogOut() {
            auth.signOut().then(() => location.reload());
        }

        function showApp(user) {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('appSection').classList.remove('hidden');
            document.getElementById('userEmail').textContent = user.email;
            loadDemoData();
        }

        function loadDemoData() {
            expenses = [
                {id:1, date:"2025-06-17", desc:"Swiggy - Biryani", amount:320, category:"Food & Dining", type:"Online"},
                {id:2, date:"2025-06-16", desc:"Petrol Fill", amount:1450, category:"Petrol / Fuel", type:"Offline"},
                {id:3, date:"2025-06-15", desc:"Amazon - Earphones", amount:1299, category:"E-commerce", type:"Online"},
                {id:4, date:"2025-06-14", desc:"BigBasket Groceries", amount:890, category:"Groceries", type:"Online"},
            ];
            renderSidebar();
            renderMainCategories();
            renderRecent();
        }

        function renderSidebar() {
            const html = `
                <div class="space-y-4">
                    <div class="flex justify-between text-sm"><span>Food & Dining</span><span class="font-medium">₹4,820</span></div>
                    <div class="flex justify-between text-sm"><span>E-commerce</span><span class="font-medium">₹7,450</span></div>
                    <div class="flex justify-between text-sm"><span>Petrol / Fuel</span><span class="font-medium">₹3,200</span></div>
                    <div class="flex justify-between text-sm"><span>Groceries</span><span class="font-medium">₹5,980</span></div>
                </div>`;
            document.getElementById('sidebarCategories').innerHTML = html;
        }

        function renderMainCategories() {
            const categories = ["Food & Dining", "Groceries", "E-commerce", "Petrol / Fuel", "Ride & Logistics", "Clothes & Fashion"];
            let html = '';
            categories.forEach(cat => {
                html += `
                    <div class="bg-white rounded-3xl p-6 card-hover shadow">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="font-semibold text-lg">${cat}</h3>
                            <span class="text-emerald-600 font-medium">₹3,240</span>
                        </div>
                        <div class="text-sm text-gray-500">3 transactions this month</div>
                    </div>`;
            });
            document.getElementById('mainCategories').innerHTML = html;
        }

        function renderRecent() {
            const container = document.getElementById('recentList');
            container.innerHTML = expenses.map(e => `
                <div class="flex justify-between items-center p-4 bg-gray-50 rounded-2xl">
                    <div>
                        <p class="font-medium">${e.desc}</p>
                        <p class="text-xs text-gray-500">${e.date} • ${e.type}</p>
                    </div>
                    <p class="font-semibold text-red-600">-₹${e.amount}</p>
                </div>
            `).join('');
        }

        function showAddModal() {
            const desc = prompt("Description / Item:");
            const amount = prompt("Amount (₹):");
            if (desc && amount) {
                alert(`✅ Expense added: ₹${amount} for ${desc}`);
                loadDemoData();
            }
        }

        auth.onAuthStateChanged(user => {
            if (user) showApp(user);
        });
    </script>
</body>
</html>
