<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrackSpent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-600 to-blue-600 min-h-screen flex items-center justify-center p-4">

    <!-- Auth Screen -->
    <div id="authSection" class="bg-white rounded-3xl shadow-2xl p-8 w-full max-w-md">
        <h2 class="text-3xl font-bold text-center text-indigo-700 mb-2">TrackSpent</h2>
        <p class="text-center text-gray-500 mb-8">"See It. Limit It. Own It."</p>

        <input type="email" id="email" placeholder="Email" class="w-full px-4 py-3 border border-gray-300 rounded-2xl mb-4 focus:outline-none focus:border-indigo-500">
        
        <div class="relative mb-6">
            <input type="password" id="password" placeholder="Password" class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-indigo-500">
            <span id="togglePassword" class="absolute right-4 top-4 text-gray-400 cursor-pointer text-xl">👁️</span>
        </div>

        <button onclick="handleSignUp()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-4 rounded-2xl mb-3">Sign Up</button>
        <button onclick="handleLogIn()" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-4 rounded-2xl">Log In</button>
    </div>

    <!-- Simple Dashboard -->
    <div id="appSection" class="hidden w-full max-w-4xl mx-auto p-6">
        <div class="bg-white rounded-3xl shadow-2xl p-10 text-center">
            <h1 class="text-4xl font-bold text-indigo-700 mb-4">Welcome to TrackSpent</h1>
            <p id="userEmail" class="text-lg text-gray-600 mb-8"></p>
            
            <button onclick="showAddModal()" class="bg-indigo-600 text-white px-8 py-4 rounded-2xl text-lg mb-6">
                + Add Your First Expense
            </button>
            
            <button onclick="handleLogOut()" class="text-red-600 hover:text-red-700">Logout</button>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyBM8GjRfW5j7p50NPBEbuRyISjN99Wn3gs",
          authDomain: "trackspent-d2d17.firebaseapp.com",
          projectId: "trackspent-d2d17",
          storageBucket: "trackspent-d2d17.firebasestorage.app",
          messagingSenderId: "74213513134",
          appId: "1:74213513134:web:c44737431f175a030f1a3f"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // Password Toggle
        document.getElementById('togglePassword').addEventListener('click', function() {
            const pwd = document.getElementById('password');
            if (pwd.type === "password") {
                pwd.type = "text";
                this.textContent = "🙈";
            } else {
                pwd.type = "password";
                this.textContent = "👁️";
            }
        });

        function handleSignUp() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || password.length < 6) {
                alert("Please enter valid email and password (min 6 characters)");
                return;
            }

            auth.createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    alert("✅ Account created successfully!");
                    showApp(userCredential.user);
                })
                .catch((error) => {
                    alert("Signup Error: " + error.message);
                });
        }

        function handleLogIn() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                alert("Please fill email and password");
                return;
            }

            auth.signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    alert("✅ Login successful!");
                    showApp(userCredential.user);
                })
                .catch((error) => {
                    alert("Login Error: " + error.message);
                });
        }

        function handleLogOut() {
            auth.signOut().then(() => {
                document.getElementById('appSection').classList.add('hidden');
                document.getElementById('authSection').classList.remove('hidden');
                document.getElementById('email').value = '';
                document.getElementById('password').value = '';
            });
        }

        function showApp(user) {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('appSection').classList.remove('hidden');
            document.getElementById('userEmail').textContent = "Logged in as: " + user.email;
        }

        // Check if already logged in
        auth.onAuthStateChanged((user) => {
            if (user) {
                showApp(user);
            }
        });
    </script>
</body>
</html>
